<style>
  :root {
    --bone: #F7F8F6;
    --bone-deep: #ECEEEA;
    --ink: #16241C;
    --forest: #214030;
    --ink-soft: #5C6A62;
    --sky: #2DACFF;
    --sky-soft: #6FC4FF;
    --line: rgba(33, 64, 48, 0.14);

    --font-display: 'Fraunces', serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #025DDF;
    color: var(--ink);
    font-family: var(--font-body);
    height: 100%;
  }

  body {
    height: 100vh;
    max-height: 1080px;
    min-height: 680px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Mobile: dvh tracks the *real* visible viewport (accounts for browser
     chrome like Safari's address bar), and we allow vertical scrolling as
     a safety net instead of clipping content that doesn't fit. */
  @media (max-width: 480px), (max-height: 760px) {
    body {
      height: 100dvh;
      max-height: none;
      min-height: 100dvh;
      overflow-y: auto;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }

  /* ---------- Full-bleed ambient canvas, behind everything ---------- */
  #washCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  /* ---------- Header ---------- */
  header {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 28px clamp(20px, 5vw, 64px) 0;
  }

  .header-spacer { width: 1px; }

  /* ---------- Centered brand block (logo + wordmark), sits above the headline ---------- */
  .brand-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 18px;
  }

  .brand-logo {
    height: 56px;
    width: auto;
  }

  /* ---------- Page header: brand lockup, pinned to the top ---------- */
  .page-header {
    position: relative;
    z-index: 5;
    display: flex;
    justify-content: center;
    padding-top: clamp(28px, 5vh, 48px);
  }

  @media (max-width: 480px), (max-height: 760px) {
    .page-header {
      padding-top: max(env(safe-area-inset-top, 0px), 32px);
    }
  }

  .wordmark-center {
    font-family: var(--font-display);
    font-size: 21px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: #FFFFFF;
    line-height: 1;
  }

  .wordmark-center span {
    color: #F2EEE1;
    font-style: italic;
    margin-left: 6px;
  }

  .matches-switch {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    background: rgba(247, 248, 246, 0.6);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.25s ease;
    backdrop-filter: blur(4px);
    justify-self: end;
  }

  .matches-switch:hover {
    color: var(--forest);
    border-color: var(--ink-soft);
  }

  .matches-switch.active {
    background: var(--forest);
    color: var(--bone);
    border-color: var(--forest);
  }

  .date-pill {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 100px;
    padding: 6px 14px;
    background: rgba(255, 255, 255, 0.12);
    justify-self: center;
    backdrop-filter: blur(4px);
    min-width: 84px;
    text-align: center;
    white-space: nowrap;
  }

  .date-pill-inline {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 100px;
    padding: 6px 14px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(4px);
    min-width: 84px;
    text-align: center;
    white-space: nowrap;
    margin-top: 22px;
    margin-bottom: 18px;
  }

  .mode-toggle {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(4px);
    border-radius: 100px;
    padding: 4px;
    gap: 2px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    margin-bottom: 22px;
  }

  .mode-toggle button {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 100px;
    border: none;
    background: transparent;
    color: rgba(255, 255, 255, 0.7);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .mode-toggle button.active {
    background: #FFFFFF;
    color: #025DDF;
  }

  .date-pill-inline #pillText,
  .date-pill #pillText {
    display: inline-block;
    transition: opacity 0.5s ease;
  }

  .date-pill-inline #pillText.fading,
  .date-pill #pillText.fading {
    opacity: 0;
  }

  .ritual-lines {
    margin-top: 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .ritual-lines p {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 15px;
    color: rgba(255, 255, 255, 0.75);
    letter-spacing: 0.01em;
    line-height: 1.5;
  }

  /* ---------- Main stage ---------- */
  main {
    flex: 1;
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 clamp(20px, 5vw, 64px);
    text-align: center;
  }

  .scores-zone {
    margin-top: 28px;
    width: min(440px, 88vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: opacity 0.5s ease, max-height 0.5s ease;
  }

  .scores-zone.visible {
    opacity: 1;
    max-height: 280px;
  }

  .score-line {
    font-family: var(--font-mono);
    font-size: clamp(13px, 2.2vw, 15px);
    display: flex;
    align-items: center;
    gap: 16px;
    color: var(--ink-soft);
    opacity: 0.32;
    transform: translateY(4px) scale(0.98);
    transition: opacity 0.6s ease, transform 0.6s ease, color 0.6s ease;
    background: rgba(247, 248, 246, 0.55);
    backdrop-filter: blur(3px);
    padding: 6px 16px;
    border-radius: 100px;
  }

  .score-line .vs { opacity: 0.5; font-size: 0.85em; }

  .score-line .tally {
    font-weight: 500;
    color: var(--ink-soft);
    transition: color 0.6s ease;
  }

  .score-line .tally em {
    font-style: normal;
    color: var(--sky);
    font-size: 0.8em;
    margin-left: 4px;
  }

  .score-line.active {
    opacity: 1;
    transform: translateY(0) scale(1.05);
    color: var(--ink);
  }

  .score-line.active .tally { color: var(--forest); }

  .score-line.told {
    opacity: 0.62;
    transform: translateY(0) scale(1);
  }

  /* ---------- Headline + controls ---------- */
  .headline {
    max-width: 560px;
    margin-bottom: 8px;
  }

  .headline h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(28px, 4.4vw, 38px);
    line-height: 1.2;
    color: #FFFFFF;
    text-shadow: 0 2px 20px rgba(2, 40, 100, 0.4);
  }

  .headline h1 em {
    font-style: italic;
    color: #F2EEE1;
  }

  .headline p {
    margin-top: 10px;
    font-size: 15px;
    color: rgba(255, 255, 255, 0.8);
    letter-spacing: 0.01em;
  }

  .headline .subline {
    margin-top: 8px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.65);
    letter-spacing: 0.01em;
    font-weight: 400;
  }

  .controls {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .play-row {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .play-button {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    background: #FFFFFF;
    color: #025DDF;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(2, 30, 80, 0.35);
    transition: transform 0.25s ease, background 0.3s ease;
    position: relative;
  }

  .play-button:hover { transform: scale(1.05); }
  .play-button:active { transform: scale(0.97); }

  .play-button.playing {
    background: #F2EEE1;
    animation: pulse-glow 4.5s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 8px 30px rgba(149, 238, 242, 0.25); }
    50% { box-shadow: 0 8px 30px rgba(149, 238, 242, 0.5), 0 0 0 16px rgba(149, 238, 242, 0.10); }
  }

  .play-button svg { width: 25px; height: 25px; }

  .play-meta { text-align: left; }

  .play-meta .label {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .play-meta .runtime {
    font-size: 13.5px;
    color: var(--forest);
    margin-top: 2px;
    font-weight: 500;
  }

  .voice-toggle {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(4px);
    border-radius: 100px;
    padding: 4px;
    gap: 2px;
    border: 1px solid var(--line);
  }

  .voice-toggle button {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 100px;
    border: none;
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .voice-toggle button.active {
    background: var(--forest);
    color: var(--bone);
  }

  audio { display: none; }

  /* ---------- Footer: "Created by" credit ---------- */
  .site-footer {
    position: fixed;
    bottom: 16px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    z-index: 6;
  }

  @media (max-width: 480px), (max-height: 760px) {
    .site-footer {
      position: static;
      margin-top: 28px;
      padding-bottom: 24px;
    }
  }

  .footer-link {
    display: flex;
    align-items: center;
    gap: 3.5px; /* ~30% smaller than the previous 5px */
    text-decoration: none;
    color: rgba(255, 255, 255, 0.5);
    font-family: var(--font-body);
    font-size: 8.6px;
    letter-spacing: 0.01em;
    transition: color 0.25s ease, opacity 0.25s ease;
    opacity: 0.85;
  }

  .footer-link:hover {
    color: rgba(255, 255, 255, 0.85);
    opacity: 1;
  }

  .footer-link img {
    height: 15.6px; /* another ~20% larger than the previous 13px */
    width: 15.6px;
    opacity: 0.85;
  }

  .footer-text {
    opacity: 0.9;
  }

  @media (max-height: 760px) {
    header { padding-top: 20px; }
    .controls { margin-top: 20px; }
    .headline h1 { font-size: clamp(24px, 4vw, 32px); }
  }

  @media (max-width: 480px) {
    .play-row { gap: 12px; }
    .voice-toggle button { padding: 7px 14px; font-size: 12.5px; }
    .brand-logo { height: 44px; }
  }
</style>
</head>

<script>
  // ---------- Full-bleed ambient wash, breathing color (~5.5s cycle) ----------
  (function () {
    var canvas = document.getElementById('washCanvas');
    var ctx = canvas.getContext('2d');
    var W, H;

    function resize() {
      W = canvas.width = window.innerWidth * window.devicePixelRatio;
      H = canvas.height = window.innerHeight * window.devicePixelRatio;
      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // Reference-image palette — deep blue base, bright cyan river, cream highlights
    var palette = [
      { r: 2, g: 93, b: 223 },    // deep blue
      { r: 47, g: 149, b: 246 },  // mid blue
      { r: 149, g: 238, b: 242 }, // bright cyan
      { r: 242, g: 238, b: 225 }, // cream
    ];

    var blobs = [];
    for (var i = 0; i < 6; i++) {
      var c = palette[i % palette.length];
      blobs.push({
        c: c,
        ox: Math.random(), oy: Math.random(),
        ax: Math.random() * 1000, ay: Math.random() * 1000,
        sx: 0.00004 + Math.random() * 0.00003,
        sy: 0.00003 + Math.random() * 0.00004,
        rBase: 0.36 + Math.random() * 0.18,
      });
    }

    function frame(t) {
      var w = window.innerWidth, h = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#025DDF';
      ctx.fillRect(0, 0, w, h);

      var breath = 0.85 + 0.15 * Math.sin(t * 0.00057);

      ctx.globalCompositeOperation = 'lighter';
      blobs.forEach(function (b) {
        var x = (b.ox + 0.2 * Math.sin(t * b.sx + b.ax)) * w;
        var y = (b.oy + 0.2 * Math.cos(t * b.sy + b.ay)) * h;
        var r = b.rBase * Math.max(w, h) * breath;
        var grad = ctx.createRadialGradient(x, y, 0, x, y, r);
        grad.addColorStop(0, 'rgba(' + b.c.r + ',' + b.c.g + ',' + b.c.b + ',0.35)');
        grad.addColorStop(1, 'rgba(' + b.c.r + ',' + b.c.g + ',' + b.c.b + ',0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalCompositeOperation = 'source-over';

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  })();

  // ---------- Recap-only playback ----------
  var audioEl = document.getElementById('audioPlayer');
  var playButton = document.getElementById('playButton');
  var playIcon = document.getElementById('playIcon');
  var pauseIcon = document.getElementById('pauseIcon');
  var sublineText = document.getElementById('sublineText');

  function stopPlayback() {
    audioEl.pause();
    audioEl.currentTime = 0;
    playButton.classList.remove('playing');
    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';
  }

  audioEl.src = 'audio/today-male.mp3';
  audioEl.load();

  playButton.addEventListener('click', function () {
    if (audioEl.paused) {
      audioEl.play().catch(function () {
        // No audio file present yet in this preview — visuals still work
      });
      playButton.classList.add('playing');
      playIcon.style.display = 'none';
      pauseIcon.style.display = 'block';
    } else {
      audioEl.pause();
      playButton.classList.remove('playing');
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
    }
  });

  audioEl.addEventListener('ended', function () {
    playButton.classList.remove('playing');
    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';
  });

  // ---------- Cycling pill: date <-> latest real scores / upcoming fixtures ----------
  var pillText = document.getElementById('pillText');
  var pillSequence = [];
  var pillIndex = 0;
  var pillIntervalId = null;

  var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

  function todayDateString() {
    var d = new Date();
    return months[d.getMonth()] + ' ' + d.getDate();
  }

  function shortCode(teamName) {
    // Simple 3-letter code from a full team name. Falls back gracefully
    // for short names.
    var clean = teamName.toUpperCase().replace(/[^A-Z]/g, '');
    return clean.slice(0, 3) || teamName.slice(0, 3).toUpperCase();
  }

  function buildRecapSequence(matches) {
    var lines = matches.map(function (m) {
      var suffix = m.status === 'in_progress' ? ' (live)' : '';
      return shortCode(m.home) + ' ' + m.home_score + '–' + m.away_score + ' ' + shortCode(m.away) + suffix;
    });
    return [todayDateString()].concat(lines);
  }


  function showNextPillItem() {
    pillText.classList.add('fading');
    setTimeout(function () {
      pillIndex = (pillIndex + 1) % pillSequence.length;
      pillText.textContent = pillSequence[pillIndex];
      pillText.classList.remove('fading');
    }, 500);
  }

  function startPillCycle(sequence) {
    pillSequence = sequence.length ? sequence : [todayDateString()];
    pillIndex = 0;
    pillText.textContent = pillSequence[0];
    if (pillIntervalId) clearInterval(pillIntervalId);
    pillIntervalId = setInterval(showNextPillItem, 3200);
  }

  function refreshPill() {
    startPillCycle([todayDateString()]);
    fetch('scores.json?t=' + Date.now(), { cache: 'no-store' })
      .then(function (res) { return res.ok ? res.json() : null; })
      .then(function (payload) {
        if (payload && Array.isArray(payload) && payload.length > 0) {
          startPillCycle(buildRecapSequence(payload));
        }
      })
      .catch(function () {});
  }

  refreshPill();

</script>

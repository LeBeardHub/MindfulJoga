name: Daily Mindful Joga Update

# Runs every morning at 7:00 AM Eastern Time (11:00 UTC during EDT,
# 12:00 UTC during EST — using 11:00 UTC year-round as a reasonable default).
# You can change the time by editing the cron expression below.
# Cron format: minute hour day month weekday (all in UTC)
on:
  schedule:
    - cron: '0 11 * * *'   # kept as a backup trigger, but GitHub's scheduler
                            # is documented as unreliable under load — see
                            # repository_dispatch below for the reliable path
  workflow_dispatch: {}   # also allows manually triggering a run from the Actions tab
  repository_dispatch:
    types: [daily-trigger]  # triggered externally by cron-job.org — see README

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Run daily update script
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python scripts/daily_update.py

      - name: Commit and push updated audio + script
        if: always()
        run: |
          git config user.name "mindful-joga-bot"
          git config user.email "actions@github.com"
          git add -A audio/ scripts/ scores.json upcoming.json
          git diff --quiet --cached || git commit -m "Daily update: $(date -u +'%Y-%m-%d')"
          git push
